{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="breadcrumb-outer text-center">
  <div class="container">
    <div class="breadcrumb-content">
      <h2>Register</h2>
      <ul class="breadcrumb">
        <li><a href="/">Home</a></li>
        <li class="active">Register</li>
      </ul>
    </div>
  </div>
</section>

<section class="login">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="login-form">
          <form method="post">
            {% csrf_token %}
            <div class="form-title">
              <h2>Create Account</h2>
              <p>Already have an account? <a href="/login/">Login here</a></p>
            </div>

            <div class="form-group mb-3">
              <label>Full Name <small class="text-muted">(This will be your username for login)</small></label>
              <input type="text" name="name" class="form-control" required placeholder="Enter your full name">
            </div>

        <div class="form-group mb-3">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group mb-3">
          <label>Phone Number</label>
          <input type="text" name="phone" class="form-control" required>
        </div>

        <div class="form-group mb-3">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>

        <!-- <div class="form-group mb-3">
          <label>Confirm Password</label>
          <input type="password" name="Confirm Password" class="form-control" required>
        </div> -->

        <div class="checkbox-outer mb-3">
          <input type="checkbox" required> I agree to terms & conditions
        </div>

            <button type="submit" class="btn-blue btn-red w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
